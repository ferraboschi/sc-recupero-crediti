name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    name: CI Pipeline

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Python Backend Tests and Linting
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest tests/ -v

      - name: Run flake8 linting
        run: flake8 backend/ --ignore=E501,W503,W504,F401 --max-line-length=120

      # Frontend Build
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build frontend
        run: cd frontend && npm run build

  # Deploy backend: automatico su Render (collegato al branch main via render.yaml)
  # Per deploy manuale su VPS con Docker, usare deploy/setup.sh
